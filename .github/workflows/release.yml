name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: soulcorp-desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build signed release bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-release.sh

      - name: Generate updater manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/generate-updater-manifest.sh "${VERSION}" latest.json
          cat latest.json

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            soulcorp-desktop/src-tauri/target/release/bundle/deb/*.deb
            soulcorp-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            soulcorp-desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            latest.json